# ── Render blueprint ───────────────────────────────────────────────────────
# Render does NOT read vercel.json, so the cron schedules are defined here as
# Cron Job services that call the /api/cron/* routes with the shared secret.
#
# Setup:
#   1. Render → New → Blueprint → point at this repo.
#   2. Fill the `sync: false` secrets in the "globalfight" env group
#      (DATABASE_URL is wired automatically from the Postgres instance below).
#
#
# The schema is applied by the web service's buildCommand (`prisma db push`) on
# every deploy — this repo has no Prisma migrations, so nothing else creates the
# tables. This used to be a manual "run it once in the Render Shell" step, and
# the first deploy shipped without it: with no tables, every page rendered its
# empty state ("No upcoming") instead of erroring, because the queries swallow
# the failure — the site looked dataless rather than tableless. Keep it in the
# build.
#
# Cadences are grouped to keep the service count (and cost) down; they mirror
# vercel.json. Each job is a plain curl, so a failure just retries next tick.

databases:
  - name: globalfight-db
    databaseName: globalfight
    # Legacy plans ('starter') are rejected for new databases. Current tiers:
    # free (expires after 30 days), basic-256mb, basic-1gb, basic-4gb, pro-*.
    # The whole dataset (fighters/events/fights/articles) is well under 256MB.
    plan: basic-256mb

envVarGroups:
  - name: globalfight
    envVars:
      - key: NODE_ENV
        value: production
      # Shared cron secret — cron-handler.ts accepts SCRAPE_CRON_SECRET or CRON_SECRET.
      - key: CRON_SECRET
        generateValue: true
      # Host the cron jobs curl. Set EXPLICITLY here rather than via
      # `fromService property: host` on each cron service — that indirection was
      # resolving to the bare service name ("globalfight") instead of the
      # resolvable hostname, so every job failed with
      #   curl: (7) Failed to connect to globalfight port 443
      # A literal value is defined once, shared by every cron, and can't drift.
      # If Render assigns a different origin, change it here (host only, no scheme).
      - key: APP_HOST
        value: globalfight.onrender.com
      - key: AUTH_SECRET
        generateValue: true
      # Master ingestion gate. Per-source writes are ALSO gated by
      # src/lib/ingestion-registry.ts. Leave false until you intend to scrape.
      - key: ENABLE_SCRAPER
        value: "false"
      - key: SCRAPER_RATE_LIMIT_MS
        value: "800"
      - key: SCRAPER_MAX_RETRIES
        value: "2"
      - key: BKFC_CONCURRENCY
        value: "3"
      - key: BKFC_MAX_PAGES
        value: "0"
      - key: ONE_CONCURRENCY
        value: "3"
      - key: ONE_MAX_PAGES
        value: "0"
      - key: WIKICARD_BATCH
        value: "40"
      - key: WIKICARD_CONCURRENCY
        value: "2"
      - key: MEDIA_INGESTION_ENABLED
        value: "true"
      - key: ENRICH_BATCH
        value: "30"
      - key: LOG_LEVEL
        value: info
      # ── Fill these in the Render dashboard (never commit real values) ──────
      - key: ODDS_API_KEY
        sync: false
      - key: API_SPORTS_KEY
        sync: false
      # Image storage — required for fighter photos in production (public/headshots
      # is gitignored, so local files do not deploy). See scripts/photos-upload.mts.
      - key: STORAGE_PROVIDER
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false

services:
  # ── Web app ──────────────────────────────────────────────────────────────
  - type: web
    name: globalfight
    runtime: node
    plan: starter
    # --include=dev is REQUIRED: NODE_ENV=production (set in the env group) makes
    # `npm ci` skip devDependencies, and the build needs @tailwindcss/postcss,
    # tailwindcss, typescript and prisma from there.
    #
    # `db push` runs WITH --accept-data-loss. Prisma flags *adding a unique
    # constraint* (ForumThread.eventId, Notification[userId,dedupeKey], …) as
    # possible data loss and aborts without the flag — even though those columns
    # are new/empty and nothing is dropped — which blocked a deploy. The flag
    # silences that false alarm. --skip-generate because the postinstall hook
    # already ran `prisma generate`.
    #
    # TRADE-OFF (owner-approved): this removes the automatic guard against a
    # schema change that would drop a POPULATED column. That safety is now a
    # code-review responsibility — inspect every schema diff for real column
    # drops/renames before merging, or migrate to Prisma Migrations (which apply
    # additive uniques cleanly) to restore the automatic guard.
    buildCommand: npm ci --include=dev && npx prisma db push --skip-generate --accept-data-loss && npm run build
    # boot.mts runs first, driven by the ALLOW_SEED_WORLD master switch. When it
    # is "true" the deployment is seeded ONCE if it has no seed users (idempotent).
    # When it is anything else, boot PURGES every trace of demo data from this
    # database — flipping the switch off is what turns a demo deployment into a
    # real one. It is NON-FATAL (`;`, not `&&`) so a seeding issue never stops the
    # app from starting, and it is safe to run on every restart.
    startCommand: node --import tsx prisma/seed/boot.mts ; npm start
    healthCheckPath: /
    envVars:
      - fromGroup: globalfight
      - key: DATABASE_URL
        fromDatabase:
          name: globalfight-db
          property: connectionString
      # Seed World — the MASTER switch. "true" allows simulated people to exist in
      # this database (and shows the transparent Demo World badge). ANY other value,
      # including unset, means demo data is PURGED at every boot — that is how a
      # demo deployment becomes a real one. Kept sync:false so the blueprint never
      # overwrites your dashboard choice.
      #
      # LAUNCH CHECKLIST: set ALLOW_SEED_WORLD to false (or delete it) and redeploy.
      # The next boot deletes every @seed.local account and everything it owns.
      - key: ALLOW_SEED_WORLD
        sync: false
      # Optional refinement, only read when ALLOW_SEED_WORLD=true:
      #   demo (default) → seed once if empty · refresh → rebuild once per deploy.
      # It cannot enable seeding on its own.
      - key: SEED_WORLD_MODE
        sync: false
      # Bearer token for POST /api/admin/seed-world/reset (removes all seed data).
      - key: SEED_WORLD_ADMIN_TOKEN
        generateValue: true
      # Must be a FULL origin (scheme included) — it's the base for password-reset
      # links and site metadata. `fromService property: host` yields a bare
      # hostname with no scheme, which produces broken links, so set it by hand
      # after the first deploy, to the real origin Render assigns the service
      # (Dashboard → globalfight → the URL under the service name). It looks like
      # https://globalfight.onrender.com — paste THAT, not this sentence. A
      # literal placeholder here is not a URL and config.ts will discard it.
      - key: NEXT_PUBLIC_SITE_URL
        sync: false

  # ── Cron: news + coverage (every 6h) ─────────────────────────────────────
  - type: cron
    name: gf-cron-news
    runtime: node
    plan: starter
    schedule: "0 */6 * * *"
    buildCommand: "true"
    startCommand: >-
      curl -fsS -m 600 --retry 3 --retry-delay 15 --retry-all-errors -H "Authorization: Bearer $CRON_SECRET" "https://$APP_HOST/api/cron/refresh-news"
    envVars:
      - fromGroup: globalfight

  # ── Cron: events, odds, sync (daily) ─────────────────────────────────────
  - type: cron
    name: gf-cron-daily
    runtime: node
    plan: starter
    schedule: "0 4 * * *"
    buildCommand: "true"
    startCommand: >-
      for p in refresh-events sync refresh-odds; do
        curl -fsS -m 900 --retry 3 --retry-delay 15 --retry-all-errors -H "Authorization: Bearer $CRON_SECRET" "https://$APP_HOST/api/cron/$p" || true;
      done
    envVars:
      - fromGroup: globalfight

  # ── Cron: results + pick resolution (every 3h) ───────────────────────────
  # The reward step of the habit loop — "you called it, card earned" — only fires
  # once a bout's result is ingested AND picks are graded. Running this daily meant
  # a Sunday-afternoon card's reward could wait ~a day, long after the dopamine
  # window. Every 3h ingests results then grades picks in the same run, so the
  # payoff lands within hours of the final bell. Cheap off-event: the results
  # scrape is polite (8×/day) and resolve-picks only touches decided, ungraded
  # bouts, scanning 0 rows when nothing new has finished.
  - type: cron
    name: gf-cron-results
    runtime: node
    plan: starter
    schedule: "0 */3 * * *"
    buildCommand: "true"
    startCommand: >-
      for p in refresh-results resolve-picks; do
        curl -fsS -m 900 --retry 3 --retry-delay 15 --retry-all-errors -H "Authorization: Bearer $CRON_SECRET" "https://$APP_HOST/api/cron/$p" || true;
      done
    envVars:
      - fromGroup: globalfight

  # ── Cron: promotion scrapers + Wikipedia cards (Mon & Thu) ───────────────
  - type: cron
    name: gf-cron-promotions
    runtime: node
    plan: starter
    schedule: "0 6 * * 1,4"
    buildCommand: "true"
    startCommand: >-
      for p in refresh-bkfc refresh-one refresh-wikicards; do
        curl -fsS -m 900 --retry 3 --retry-delay 15 --retry-all-errors -H "Authorization: Bearer $CRON_SECRET" "https://$APP_HOST/api/cron/$p" || true;
      done
    envVars:
      - fromGroup: globalfight

  # ── Cron: BJJ (weekly) ───────────────────────────────────────────────────
  - type: cron
    name: gf-cron-weekly
    runtime: node
    plan: starter
    schedule: "0 8 * * 1"
    buildCommand: "true"
    startCommand: >-
      curl -fsS -m 900 --retry 3 --retry-delay 15 --retry-all-errors -H "Authorization: Bearer $CRON_SECRET" "https://$APP_HOST/api/cron/refresh-adcc" || true
    envVars:
      - fromGroup: globalfight

  # ── Cron: fighter photo + bio enrichment (HOURLY) ────────────────────────
  # Split out of gf-cron-weekly. refresh-enrich drains a bounded ENRICH_BATCH
  # (30) per run and is designed — per its own route comment — to run hourly so
  # the backlog clears and every fighter is rechecked within ENRICH_STALE_DAYS.
  # Weekly contradicted that: 30/week against 230 fighters is ~8 weeks before a
  # new roster has photos, and a fighter added today waits a week for a face.
  # That reads as "fighter images are broken" during exactly the window when
  # anyone is looking. Once drained an hourly run scans 0 rows (the query only
  # takes lastProfileScrapedAt null-or-stale), so this is cheap — and it stays
  # correct if ENABLE_SCRAPER is ever turned on and the roster jumps.
  # Hourly: fighter enrichment, the return engine, and the trusted-channel video
  # ingest. ingest-feed was MISSING from every cron service, which is why
  # /clips rendered its empty state in production while working locally — the
  # catalog is only ever populated by this route. Hourly matches what the
  # YouTube RSS endpoints advertise (Cache-Control: max-age=900).
  - type: cron
    name: gf-cron-enrich
    runtime: node
    plan: starter
    schedule: "0 * * * *"
    buildCommand: "true"
    startCommand: >-
      for p in refresh-enrich return-engine ingest-feed; do
        curl -fsS -m 900 --retry 3 --retry-delay 15 --retry-all-errors -H "Authorization: Bearer $CRON_SECRET" "https://$APP_HOST/api/cron/$p" || true;
      done
    envVars:
      - fromGroup: globalfight
